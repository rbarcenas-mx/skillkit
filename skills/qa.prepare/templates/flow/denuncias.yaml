--- STEP
type: http
id: "{{ID}}-01"
desc: "Solicitante denuncia al mandadero por acoso"
method: POST
url: http://localhost:3000/api/v1/denuncias
headers:
  Authorization: "Bearer {{SOLICITANTE_TOKEN}}"
  Content-Type: application/json
body:
  id_usuario_denunciado: "{{MANDADERO_ID_VAR}}"
  id_mandado: "{{MANDADO_ID_VAR}}"
  motivo: "acoso"
  descripcion: "Mensajes inapropiados post entrega"
expected:
  status: 201
  body_contains: ["id", "estado"]

